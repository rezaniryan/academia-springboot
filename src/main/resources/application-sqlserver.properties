# LAB FACENS A27 - SQL Server Express
# No SSMS, conectar em: A2702\SQLEXPRESS usando Autenticação do Windows.
# Para a aplicação Spring Boot, use UMA das opções abaixo.

# OPÇÃO A - SQL Server pela porta 1433, quando o serviço estiver fixo na porta 1433:
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=academia;encrypt=true;trustServerCertificate=true

# OPÇÃO B - SQL Server Express por nome de instância, caso a porta 1433 não funcione:
# spring.datasource.url=jdbc:sqlserver://localhost\SQLEXPRESS;databaseName=academia;encrypt=true;trustServerCertificate=true

# Usuário e senha usados pela aplicação. Ajustar conforme orientação do laboratório.
# No SSMS o acesso pode ser por Autenticação do Windows; na aplicação, normalmente usamos SQL Authentication.
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect